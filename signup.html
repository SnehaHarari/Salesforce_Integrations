<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Joya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#1a1a1a',
                        gold: '#D4AF37'
                    }
                }
            }
        }
    </script>
    <script type="text/javascript" src="//cdn.evgnet.com/beacon/cloudodysseyitsolutionsltd/jewellery_dataset/scripts/evergage.min.js"></script>
</head>
<body class="bg-gray-50 text-dark font-sans">     <header class="fixed w-full z-50 bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
<a href="index.html" class="flex-shrink-0 flex items-center">
             <img src="https://res.cloudinary.com/dxn2nw6rx/image/upload/v1782306625/copy_of_ssr2115w_f_1_wmgfwv.png"   alt="Joya Logo" 
                class="h-24 w-auto object-contain scale-150"> </a>
                            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-sm font-medium hover:text-gold transition">Home</a>
                <a href="collection.html" class="text-sm font-medium hover:text-gold transition">Collection</a>
            </nav>
            <div class="flex items-center space-x-6">
                <a href="login.html" class="text-gold"><i class="fas fa-user"></i></a>
                <a href="cart.html" class="hover:text-gold transition relative">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-gold text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </a>
            </div>
        </div>
    </header>
       <main class="min-h-screen flex items-center justify-center pt-20 px-4">
     
    <div class="bg-white p-8 shadow-lg w-full max-w-md border border-gray-200">
        <h2 class="font-serif text-2xl text-center mb-8">Sign Up</h2>
        
       <form id="signup-form" class="space-y-4">
    <div>
        <label class="block text-sm font-medium">Full Name</label>
        <input type="text" id="signup-name" required class="w-full border p-2">
    </div>
    <div>
        <label class="block text-sm font-medium">Phone Number</label>
        <input type="tel" id="signup-phone" required class="w-full border p-2">
    </div>
    <div>
        <label class="block text-sm font-medium">Email</label>
        <input type="email" id="signup-email" required class="w-full border p-2">
    </div>
    <div>
        <label class="block text-sm font-medium">Password</label>
        <input type="password" id="signup-pass" required class="w-full border p-2">
    </div>
    <button type="submit" class="w-full bg-dark text-white py-3 mt-4 hover:bg-gold transition">Sign Up</button>
</form>
    </div>
          </main>
    <script src="main.js"></script>
</body>
</html>
