<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joya | Fine Jewelry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#D4AF37', goldHover: '#B5952F', dark: '#1a1a1a' },
                    fontFamily: { sans: ['Lato', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
    <script type="text/javascript" src="//cdn.evgnet.com/beacon/cloudodysseyitsolutionsltd/jewellery_dataset/scripts/evergage.min.js"></script>
    <script src="main.js"></script>
    <style>
        #toast {
    visibility: hidden;
    min-width: 250px;
    background-color: #1a1a1a;
    color: #fff;
    text-align: center;
    border-radius: 4px;
    padding: 16px;
    position: fixed;
    z-index: 1000;
    right: 30px;
    bottom: 30px;
}
#toast.show {
    visibility: visible;
    animation: fadein 0.5s, fadeout 0.5s 2.5s;
}
@keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
@keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="bg-white text-dark font-sans">

    <!-- HEADER -->
    <header class="fixed w-full z-50 bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="flex-shrink-0">
                <h1 class="font-serif text-2xl font-bold tracking-widest"><span class="text-gold">JOYA</span></h1>
            </a>
            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-sm font-medium hover:text-gold transition">Home</a>
                <a href="collection.html" class="text-sm font-medium hover:text-gold transition">Collection</a>
            </nav>
            <div class="flex items-center space-x-6">
                <a href="login.html" class="hover:text-gold transition"><i class="fas fa-user"></i></a>
                <a href="cart.html" class="hover:text-gold transition relative">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-gold text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </a>
            </div>
        </div>
        <div id="toast">Item added to cart!</div>
    </header>

    <!-- HERO SECTION -->
    <main class="pt-20">
        <section class="relative h-[80vh] flex items-center justify-center bg-gray-100 overflow-hidden">
            <img src="https://images.unsplash.com/photo-1573408301185-9146fe634ad0?auto=format&fit=crop&w=1920&q=80" class="absolute w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/30"></div>
            <div class="relative z-10 text-center text-white">
                <p class="uppercase tracking-[0.3em] text-sm mb-4">Redefining Luxury</p>
                <h1 class="font-serif text-5xl md:text-7xl mb-8">Timeless <span class="text-gold">Beauty</span></h1>
                <a href="collection.html" class="px-10 py-3 bg-gold text-white font-medium hover:bg-goldHover transition uppercase tracking-widest text-sm inline-block">Shop Now</a>
            </div>
        </section>

        <!-- CATEGORY PREVIEW -->
        <section class="py-20 max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <h2 class="font-serif text-3xl">Browse Categories</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <!-- Links to collection page -->
                <a href="collection.html?category=Rings" class="group cursor-pointer text-center">
                    <div class="h-64 bg-gray-100 mb-4 overflow-hidden relative"><img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-500"></div>
                    <h3 class="font-serif text-lg">Rings</h3>
                </a>
                <a href="collection.html?category=Earrings" class="group cursor-pointer text-center">
                    <div class="h-64 bg-gray-100 mb-4 overflow-hidden relative"><img src="https://images.unsplash.com/photo-1535632787354-4e68ef0ac584?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-500"></div>
                    <h3 class="font-serif text-lg">Earrings</h3>
                </a>
                <a href="collection.html?category=Necklaces" class="group cursor-pointer text-center">
                    <div class="h-64 bg-gray-100 mb-4 overflow-hidden relative"><img src="https://images.unsplash.com/photo-1599643477877-530eb63abc9e?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-500"></div>
                    <h3 class="font-serif text-lg">Necklaces</h3>
                </a>
                <a href="collection.html?category=Bracelets" class="group cursor-pointer text-center">
                    <div class="h-64 bg-gray-100 mb-4 overflow-hidden relative"><img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-500"></div>
                    <h3 class="font-serif text-lg">Bracelets</h3>
                </a>
            </div>
            
        </section>
    </main>

    <!-- FOOTER (Keep consistent across all pages) -->
    <footer class="bg-dark text-white pt-16 pb-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-xs">
            &copy; 2026 LuxeJoyas. All rights reserved.
        </div>
    </footer>

    <script>
        // Simple script to update cart count from localStorage
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cart-count').textContent = cart.length;
    </script>
</body>
</html>
