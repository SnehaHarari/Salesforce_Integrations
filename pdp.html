<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Joya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { gold: '#D4AF37', dark: '#1a1a1a' } } } }
    </script>
    <script type="text/javascript" src="//cdn.evgnet.com/beacon/cloudodysseyitsolutionsltd/jewellery_dataset/scripts/evergage.min.js"></script>
</head>
<body class="bg-white font-sans text-dark">

    <main class="max-w-6xl mx-auto px-6 py-20">
        <div class="grid md:grid-cols-2 gap-16 items-start">
            <div class="bg-gray-100 aspect-square overflow-hidden">
                <img id="pdp-image" src="" alt="Product" class="w-full h-full object-cover">
            </div>

            <div class="flex flex-col gap-6">
                <h1 id="pdp-title" class="font-serif text-4xl">Loading...</h1>
                <p id="pdp-price" class="text-2xl text-gold font-light">$0.00</p>
                <div class="border-t border-gray-200 py-6">
                    <p class="text-gray-600 leading-relaxed">
                        Exquisitely crafted to perfection. This piece represents the pinnacle of modern luxury, designed for those who appreciate the finer details.
                    </p>
                </div>
                <button id="add-to-cart-btn" class="w-full bg-dark text-white py-4 hover:bg-gold transition uppercase tracking-widest text-sm">
                    Add to Cart
                </button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        // Extract Product ID and Render
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            
            // Find product in the array from main.js
            const product = products.find(p => p.id === id);
            
            if (product) {
                document.getElementById('pdp-image').src = product.image;
                document.getElementById('pdp-title').textContent = product.name;
                document.getElementById('pdp-price').textContent = `$${product.price}`;
                document.getElementById('add-to-cart-btn').onclick = () => addToCart(product.id);
            } else {
                document.querySelector('main').innerHTML = '<h2 class="text-center text-2xl">Product not found.</h2>';
            }
        });
    </script>
</body>
</html>
