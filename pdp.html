<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details | LuxeJoyas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { gold: '#D4AF37', dark: '#1a1a1a' } } } }
    </script>
</head>
<body class="bg-white text-dark font-sans">

    <header class="h-20 shadow-sm border-b border-gray-100 flex items-center justify-between px-8">
 <a href="index.html" class="flex-shrink-0 flex items-center">
             <img src="https://res.cloudinary.com/dxn2nw6rx/image/upload/v1782306625/copy_of_ssr2115w_f_1_wmgfwv.png"   alt="Joya Logo" 
                class="h-24 w-auto object-contain scale-150"> </a>
                <nav class="space-x-8">
            <a href="index.html">Home</a>
            <a href="collection.html" class="text-gold font-bold">Collection</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <a href="collection.html" class="inline-flex items-center text-sm text-gray-500 hover:text-gold mb-8 transition">
            <i class="fas fa-arrow-left mr-2"></i> Back to Collection
        </a>

        <div class="grid md:grid-cols-2 gap-16 items-start">
            <div class="bg-gray-100 aspect-square overflow-hidden">
                <img id="pdp-image" src="" alt="Product" class="w-full h-full object-cover">
            </div>

            <div class="flex flex-col gap-6">
                <h1 id="pdp-title" class="font-serif text-4xl">Loading...</h1>
                <p id="pdp-price" class="text-2xl text-gold font-light">$0.00</p>
                <button id="add-to-cart-btn" class="w-full bg-dark text-white py-4 hover:bg-gold transition uppercase tracking-widest text-sm">
                    Add to Cart
                </button>
            </div>
            <div class="Try-on"></div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Update cart count in header
            updateCartCount();

            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const product = products.find(p => p.id === id);
            
            if (product) {
                document.getElementById('pdp-image').src = product.image;
                document.getElementById('pdp-title').textContent = product.name;
                document.getElementById('pdp-price').textContent = `$${product.price}`;
                document.getElementById('add-to-cart-btn').onclick = () => addToCart(product.id);
            }
        });
    </script>
</body>
</html>
