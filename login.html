<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#D4AF37', goldHover: '#B5952F', dark: '#1a1a1a' },
                    fontFamily: { sans: ['Lato', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-dark font-sans">

    <header class="fixed w-full z-50 bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
<a href="index.html" class="flex-shrink-0 flex items-center">
             <img src="https://res.cloudinary.com/dxn2nw6rx/image/upload/v1782306625/copy_of_ssr2115w_f_1_wmgfwv.png"   alt="Joya Logo" 
                class="h-24 w-auto object-contain scale-150"> </a>
                            <nav class="hidden md:flex space-x-8">
                <a href="index.html" class="text-sm font-medium hover:text-gold transition">Home</a>
                <a href="collection.html" class="text-sm font-medium hover:text-gold transition">Collection</a>
            </nav>
            <div class="flex items-center space-x-6">
                <a href="login.html" class="text-gold"><i class="fas fa-user"></i></a>
                <a href="cart.html" class="hover:text-gold transition relative">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-gold text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="min-h-screen flex items-center justify-center pt-20 px-4">
        <div class="bg-white p-8 shadow-lg w-full max-w-md border border-gray-200">
            <h2 class="font-serif text-2xl text-center mb-8">Welcome Back</h2>
           <!-- login.html -->
<form id="login-form" class="space-y-4">
    <input type="email" id="login-email" required class="w-full border p-2">
    <input type="password" id="login-pass" required class="w-full border p-2">
    <button type="submit" class="w-full bg-dark text-white py-3">Login</button>
</form>
            <p class="mt-6 text-center text-sm text-gray-500">
                Don't have an account? <a href="signup.html" class="text-gold font-bold">Sign Up</a>
            </p>
        </div>
    </main>
    <!-- FOOTER (Keep consistent across all pages) -->
    <footer class="bg-dark text-white pt-16 pb-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-xs">
            &copy; 2026 Joya. All rights reserved.
        </div>
    </footer>
    <script src="main.js"></script>
    <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault(); // This is crucial: it stops the form from reloading the page
        
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-pass').value;

        try {
            handleLogin(email, password); // This calls the function in your main.js
        } catch (err) {
            alert(err.message);
        }
    });
</script>
</body>
</html>
